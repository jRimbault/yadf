[package]
name = "yadf"
version = "1.0.0"
authors = ["jRimbault <jacques.rimbault@gmail.com>"]
edition = "2018"
description = "yet another dupes finder"
license = "MIT"
homepage = "https://github.com/jRimbault/yadf"
repository = "https://github.com/jRimbault/yadf"
readme = "README.md"
categories = ["command-line-utilities", "filesystem"]
keywords = ["dupe", "duplicate", "finder", "fdupes", "fast"]

[[bin]]
name = "yadf"

[workspace]
members = [
  "crates/*",
]

[dependencies]
ahash = "0.7.0"
anyhow = "1.0.38"
atty = "0.2.14"
byte-unit = { version = "4.0.8", default-features = false }
clap = { version = "3.0.0", features = ["derive"] }
clap-verbosity-flag = "0.4"
csv = "1.1.4"
env_logger = "0.9"
globset = "0.4.6"
highway = "0.7"
human-panic = "1.0.3"
log = "0.4.11"
metrohash = "1.0.6"
regex = "1.4.2"
seahash = "4.0.1"
serde_json = "1.0.57"
twox-hash = "1.5.0"
yadf-lib-bag = { path = "crates/bag", features = ["serde"] }
yadf-lib = { path = "crates/lib" }

[dev-dependencies]
assert_cmd = "2"
dirs = "4"
env_logger = "0.9"
highway = "0.7"
serde_json = "1.0.57"
seahash = "4.0.1"
twox-hash = "1.5.0"
predicates = "2"
rand = "0.8"
once_cell = "1"
